name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r requirements.txt || pip install flask requests

      - name: Lint JavaScript
        run: npm run lint || npx eslint --no-eslintrc --env browser,es2020 --parser-options=ecmaVersion:2020 *.js || true

      - name: Lint Python
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Check Python syntax
        run: python -m py_compile app.py holoServer.py

      - name: Validate HTML files exist
        run: |
          for f in index.html boot.html home.html results.html anatomy-3d.html; do
            if [ ! -f "$f" ]; then echo "Missing: $f"; exit 1; fi
          done
          echo "All HTML files present"

      - name: Validate required assets
        run: |
          if [ ! -d "client/assets" ]; then echo "Missing client/assets"; exit 1; fi
          echo "Assets directory exists"

      - name: Validate CSS/JS files exist
        run: |
          for f in style.css login.css login.js script.js; do
            if [ ! -f "$f" ]; then echo "Missing: $f"; exit 1; fi
          done
          echo "All CSS/JS files present"

  build-static:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Flask app loads
        run: |
          pip install flask requests
          python -c "from app import app; print('Flask app imports successfully')"

      - name: Verify Node server syntax
        run: node --check server.js && echo "Node server syntax OK"

  deploy:
    runs-on: ubuntu-latest
    needs: build-static
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway/action-deploy@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
