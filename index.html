<!DOCTYPE html>
<html>

<head>

	<title>MediScan Login</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			color: white;
		}

		.login-box {
			background: rgba(0, 0, 0, 0.6);
			padding: 40px;
			border-radius: 10px;
			width: 300px;
			text-align: center;
		}

		input {
			width: 100%;
			padding: 10px;
			margin: 10px 0;
			border: none;
			border-radius: 5px;
		}

		button {
			width: 100%;
			padding: 10px;
			background: #00c6ff;
			border: none;
			border-radius: 5px;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #0072ff;
		}
	</style>

</head>

<body>

	<div class="login-box">

		<h2>MediScan Platform</h2>

		<input type="text" id="username" placeholder="Username">

		<input type="password" id="password" placeholder="Password">

		<button onclick="login()">Login</button>

		<p id="error"></p>

	</div>

	<script>

		function login() {

			const user = document.getElementById("username").value;
			const pass = document.getElementById("password").value;

			if (user === "admin" && pass === "mediscan") {

				window.location.href = "boot.html";

			}
			else {

				document.getElementById("error").innerText = "Invalid login credentials";

			}

		}

	</script>

</body>

</html>
