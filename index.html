<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>MediScan | Multimedia Medical Visualizer</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Segoe UI", sans-serif;
		}

		body {
			background: radial-gradient(circle at top, #1f2c3d, #0f141a);
			color: white;
			text-align: center;
			padding: 30px;
		}

		h1 {
			font-size: 2.8rem;
			margin-bottom: 10px;
			color: #00e0ff;
		}

		h2 {
			margin-top: 40px;
			margin-bottom: 10px;
		}

		.container {
			max-width: 900px;
			margin: auto;
		}

		textarea {
			width: 100%;
			height: 120px;
			padding: 15px;
			border-radius: 8px;
			border: none;
			resize: none;
			font-size: 1rem;
		}

		button {
			margin-top: 15px;
			padding: 12px 25px;
			border: none;
			border-radius: 6px;
			background: #00e0ff;
			color: black;
			font-weight: bold;
			cursor: pointer;
			transition: 0.3s;
		}

		button:hover {
			background: #00b5cc;
		}

		.output {
			margin-top: 30px;
			padding: 20px;
			background: rgba(255, 255, 255, 0.08);
			border-radius: 10px;
			min-height: 120px;
		}

		.ghost-container {
			margin-top: 60px;
		}

		.ghost-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 20px;
			margin-top: 20px;
		}

		video {
			width: 100%;
			border-radius: 10px;
		}

		footer {
			margin-top: 60px;
			font-size: 0.8rem;
			opacity: 0.6;
		}
	</style>
</head>

<body>

	<h1>MediScan</h1>
	<p>AI-Powered Multimedia Medical Visualization System</p>

	<div class="container">

		<h2>🎤 Describe Your Symptoms</h2>

		<textarea id="symptoms" placeholder="Click microphone or type symptoms..."></textarea>
		<br>

		<button onclick="startSpeech()">🎤 Start Voice Input</button>
		<button onclick="analyze()">🧠 Analyze</button>

		<div class="output" id="result">
			AI explanation will appear here...
		</div>

		<h2>🎥 4-Sided Pepper's Ghost Hologram Mode</h2>

		<p>Place device in transparent pyramid to view hologram illusion.</p>

		<div class="ghost-grid">
			<video class="ghost-video" autoplay loop muted src="client/assets/default.mp4"></video>
		</div>

	</div>

	<footer>
		Electronic Media & Multimedia Systems Project — 2026
	</footer>
	<script>
		// 🎤 Voice Input (Web Speech API)
		function startSpeech() {

			if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
				alert("Speech recognition not supported. Use Chrome or Chromium.");
				return;
			}

			const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
			const recognition = new SpeechRecognition();

			recognition.lang = "en-US";
			recognition.start();

			recognition.onresult = function (event) {
				document.getElementById("symptoms").value =
					event.results[0][0].transcript;
			};

			recognition.onerror = function (event) {
				console.error("Speech error:", event.error);
			};
		}


		// 🧠 AI Simulation + Video Switch
		function analyze() {

			const input = document.getElementById("symptoms").value.toLowerCase();
			const resultDiv = document.getElementById("result");

			if (input.trim() === "") {
				resultDiv.innerHTML = "Please describe your symptoms.";
				return;
			}

			let explanation = "";
			let videoFile = "assets/default.mp4";

			// ---- AI LOGIC ----
			if (input.includes("chest") || input.includes("heart")) {

				explanation = "Chest pain may indicate cardiovascular strain or reduced oxygen supply. Clinical evaluation such as ECG is recommended.";
				videoFile = "client/assets/heart.mp4";

			} else if (input.includes("head") || input.includes("brain")) {

				explanation = "Headache may result from neurological stress, dehydration, or vascular changes.";
				videoFile = "client/assets/brain.mp4";

			} else if (input.includes("lung") || input.includes("breath")) {

				explanation = "Breathing difficulty may indicate pulmonary inflammation or airway obstruction.";
				videoFile = "client/assets/lungs.mp4";

			} else {

				explanation = "Symptoms require further diagnostic evaluation to determine physiological causes.";
				videoFile = "client/assets/default.mp4";
			}

			// Display explanation
			resultDiv.innerHTML = explanation;

			// 🔊 Speak explanation
			speak(explanation);

			// 🎥 Switch hologram videos
			const videos = document.querySelectorAll(".ghost-video");

			videos.forEach(video => {
				video.src = videoFile;
				video.load();
				video.play();
			});
		}


		// 🔊 Text-to-Speech
		function speak(text) {

			if (!('speechSynthesis' in window)) {
				console.log("TTS not supported.");
				return;
			}

			const speech = new SpeechSynthesisUtterance(text);
			speech.lang = "en-US";
			speech.rate = 1;
			speech.pitch = 1;

			window.speechSynthesis.speak(speech);
		}
	</script>

</body>

</html>
