<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>MediScan | Multimedia Medical Visualizer</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="client/assets/logo.png">
	<script src="script.js"></script>
</head>

<body>

	<h1>MediScan</h1>
	<p>AI-Powered Multimedia Medical Visualization System</p>

	<div class="container">
		<h2>🎤 Describe Your Symptoms</h2>
		<label for="symptoms" style="position:absolute;left:-10000px;">Describe your symptoms</label>
		<textarea id="symptoms" placeholder="Click microphone or type symptoms..."
			aria-describedby="listeningStatus"></textarea>
		<br>
		<button onclick="startSpeech()">🎤 Start Voice Input</button>
		<button onclick="analyze()">🧠 Analyze</button>
		<div id="listeningStatus" role="status" aria-live="polite"></div>
	</div>
	<div>
		<video class="bg-video" autoplay loop muted src="client/assets/default.mp4"></video>
	</div>

	<footer>
		Electronic Media & Multimedia Systems Project — 2026<br>
		By ~Digital Minds Co.
	</footer>

</body>

</html>
