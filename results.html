<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>MediScan Diagnostic Result</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		body {
			margin: 0;
			background: black;
			overflow: hidden;
			font-family: Arial, Helvetica, sans-serif;
			color: white;
		}

		#videoContainer {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}

		#resultVideo {
			width: 100%;
			height: 100%;
			object-fit: cover;
			opacity: 0;
			animation: fadeIn 1.5s forwards;
		}

		@keyframes fadeIn {
			to {
				opacity: 1;
			}
		}

		#subtitleBox {
			position: absolute;
			bottom: 40px;
			width: 100%;
			text-align: center;
			font-size: 28px;
			background: rgba(0, 0, 0, 0.45);
			padding: 20px;
		}

		#label {
			position: absolute;
			top: 20px;
			left: 20px;
			font-size: 18px;
			letter-spacing: 2px;
			color: #00eaff;
		}
	</style>
</head>

<body>

	<div id="videoContainer">
		<video id="resultVideo" autoplay muted loop playsinline></video>
	</div>
	<div id="label">MEDISCAN DIAGNOSTIC OUTPUT</div>
	<div id="subtitleBox"><span id="subtitle"></span></div>

	<script>
		document.addEventListener("DOMContentLoaded", () => {
			// --- Get stored results ---
			const explanation = localStorage.getItem("mediscan_explanation") || "No explanation available.";
			const bodyPart = localStorage.getItem("mediscan_bodypart") || "general";

			const videoEl = document.getElementById("resultVideo");
			const subtitleEl = document.getElementById("subtitle");

			// --- Select video based on body part ---
			let videoFile = "client/assets/default.mp4";
			if (bodyPart === "head") videoFile = "client/assets/brain.mp4";
			if (bodyPart === "chest") videoFile = "client/assets/heart.mp4";
			if (bodyPart === "lungs") videoFile = "client/assets/lungs.mp4";
			if (bodyPart === "stomach") videoFile = "client/assets/stomach.mp4";

			videoEl.src = videoFile;
			videoEl.load();
			videoEl.play().catch(() => { });

			// --- Show subtitle ---
			subtitleEl.textContent = explanation;

			// --- Text-to-Speech ---
			if ('speechSynthesis' in window) {
				const speech = new SpeechSynthesisUtterance(explanation);
				speech.lang = "en-US";
				speech.rate = 1;
				speech.pitch = 1;
				window.speechSynthesis.cancel();
				window.speechSynthesis.speak(speech);
			}

			// --- ESC or Enter fallback to go back to index ---
			document.addEventListener("keydown", (event) => {
				if (event.key === "Escape" || event.key === "Enter") {
					window.speechSynthesis.cancel();
					window.location.href = "home.html";
				}
			});
		});
	</script>

</body>

</html>
