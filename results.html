<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>MediScan Diagnostic Result</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		body {
			margin: 0;
			background: black;
			font-family: Arial, Helvetica, sans-serif;
			color: white;
			display: flex;
			flex-direction: column;
			height: 100vh;
		}

		#label {
			position: absolute;
			top: 15px;
			left: 20px;
			font-size: 16px;
			letter-spacing: 2px;
			color: #00eaff;
		}

		#videoContainer {
			width: 100%;
			height: 70vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: black;
		}

		#resultVideo {
			width: 100%;
			height: 100%;
			object-fit: contain;
			opacity: 0;
			animation: fadeIn 1.5s forwards;
		}

		@keyframes fadeIn {
			to {
				opacity: 1;
			}
		}

		#subtitleBox {
			width: 100%;
			text-align: center;
			font-size: 26px;
			background: rgba(0, 0, 0, 0.6);
			padding: 20px;
			box-sizing: border-box;
		}
	</style>
</head>

<body>

	<div id="videoContainer">
		<video id="resultVideo" autoplay muted loop playsinline></video>
	</div>

	<div id="subtitleBox">
		<span id="subtitle"></span>
	</div>

	<script>

		document.addEventListener("DOMContentLoaded", () => {

			const explanation = localStorage.getItem("mediscan_explanation") || "No explanation available.";
			const videoFile = localStorage.getItem("mediscan_video") || "client/assets/default.mp4";

			const videoEl = document.getElementById("resultVideo");
			const subtitleEl = document.getElementById("subtitle");

			videoEl.src = videoFile;
			videoEl.load();
			videoEl.play().catch(() => { });

			subtitleEl.textContent = explanation;

			if ('speechSynthesis' in window) {
				const speech = new SpeechSynthesisUtterance(explanation);
				speech.lang = "en-US";
				window.speechSynthesis.cancel();
				window.speechSynthesis.speak(speech);
			}

			document.addEventListener("keydown", (event) => {
				if (event.key === "Escape" || event.key === "Enter") {
					window.speechSynthesis.cancel();
					window.location.href = "home.html";
				}
			});

		});

	</script>

</body>

</html>
